apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-cassandra
  namespace: url-shortener
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: url-cassandra
  template:
    metadata:
      labels:
        app: url-cassandra
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: url-cassandra
          image: cassandra:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: url-shortener-cluster
            - name: CASSANDRA_DC
              value: dc1
            - name: CASSANDRA_RACK
              value: rack1
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "256M"
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"
            requests:
              cpu: 250m
              memory: 1Gi
          ports:
            - name: url-cassandra
              containerPort: 9042
          volumeMounts:
            - name: cassandra-local-storage
              mountPath: /var/lib/cassandra
              subPath: cassandra
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 20
          livenessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 180
            periodSeconds: 120
            timeoutSeconds: 20
      volumes:
        - name: cassandra-local-storage
          persistentVolumeClaim:
            claimName: cassandra-pvc