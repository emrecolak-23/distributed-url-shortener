apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-auth
  namespace: url-shortener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: url-auth
    spec:
      containers:
        - name: url-auth
          image: colakkemree/url-shortener-auth:stable
          imagePullPolicy: Always
          resources:
            limits:
              cpu: '0.5'
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 150Mi
          ports:
            - name: auth
              containerPort: 4003
          env:
            - name: ENABLE_APM
              value: '1'
            - name: NODE_ENV
              value: 'production'
            - name: GATEWAY_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: gateway-jwt-token
            - name: JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: jwt-token
            - name: RABBITMQ_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-rabbitmq-endpoint
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-postgres-host
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-postgres-password
            - name: CLIENT_URL
              value: 'https://url-shortener.info'
            - name: API_GATEWAY_URL
              value: 'http://url-gateway.url-shortener.svc.cluster.local:4000'
            - name: ELASTIC_SEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elasticsearch-url
            - name: CLUSTER_TYPE
              value: 'minikube'
            - name: ELASTIC_APM_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elastic-apm-server-url
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elastic-apm-secret-token
