apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-gateway
  namespace: url-shortener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: url-gateway
    spec:
      containers:
        - name: url-gateway
          image: colakkemree/url-shortener-gateway:stable
          imagePullPolicy: Always
          resources:
            limits:
              cpu: '0.5'
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 150Mi
          ports:
            - name: users
              containerPort: 4000
          env:
            - name: ENABLE_APM
              value: '1'
            - name: NODE_ENV
              value: 'production'
            - name: SECRET_KEY_ONE
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: secret-key-one
            - name: SECRET_KEY_TWO
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: secret-key-two
            - name: GATEWAY_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: gateway-jwt-token
            - name: JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: jwt-token
            - name: CLIENT_URL
              value: 'https://url-shortener.info'
            - name: AUTH_BASE_URL
              value: 'http://url-auth.production.svc.cluster.local:4002'
            - name: USERS_BASE_URL
              value: 'http://url-users.production.svc.cluster.local:4003'
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-redis-host
            - name: ELASTIC_SEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elasticsearch-url
            - name: ELASTIC_APM_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elastic-apm-server-url
            - name: ELASTIC_APM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: url-backend-secret
                  key: url-elastic-apm-secret-token
